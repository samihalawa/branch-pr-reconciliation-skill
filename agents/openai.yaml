interface:
  display_name: "Branch PR Reconciliation"
  short_description: "Reconcile all real repo state first, then preserve useful work and finish cleanup without stopping at reports or confirmation loops"
  default_prompt: "Use $branch-pr-reconciliation-skill to first build a real reconciliation ledger across open and closed PRs, local and remote branches, worktrees, stashes, uncommitted work, reflog, and any session evidence that may hold local-only work. Do not edit app code until that ledger exists. Then continue end-to-end: preserve still-useful changes on the current codebase, verify them, close obsolete PRs, and clean up stale branches, worktrees, and stashes without blind merges, cherry-picks, report-file detours, or confirmation stops unless the user explicitly asked to review first."
